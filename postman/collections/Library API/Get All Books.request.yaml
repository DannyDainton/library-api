$kind: http-request
description: >-
  # Get Book by ID


  ## Overview


  This endpoint retrieves detailed information about a single book from the
  library by its unique identifier. Use this endpoint when you need to fetch
  complete book details for display, editing, or reference purposes.


  ## HTTP Method and Endpoint


  ```

  GET {{baseUrl}}/books/:id

   ```

  ## Path Parameters


  | Parameter | Type | Required | Description |

  | --- | --- | --- | --- |

  | `id` | integer | Yes | The unique identifier of the book to retrieve. Must
  be a valid book ID that exists in the library database. |


  **Example:** `/books/1` retrieves the book with ID 1.


  ## Response Format


  ### Success Response (200 OK)


  The endpoint returns a JSON object containing the book's details:


  ``` json

  {
    "id": 1,
    "title": "Book Title",
    "author": "Author Name"
  }

   ```

  ### Response Fields


  | Field | Type | Description |

  | --- | --- | --- |

  | `id` | integer | The unique identifier of the book |

  | `title` | string | The title of the book |

  | `author` | string | The name of the book's author |


  ## Example Use Cases


  1. **Display Book Details**: Fetch complete information about a specific book
  to display on a book detail page
      
  2. **Verify Book Existence**: Check if a book with a specific ID exists in the
  library
      
  3. **Data Validation**: Retrieve current book data before performing update
  operations
      
  4. **Reference Lookup**: Get book information for citation or reference
  purposes
      

  ## Endpoint Behavior Notes


  - The endpoint expects a valid integer book ID in the URL path
      
  - If the book ID doesn't exist, the API may return a 404 Not Found error
      
  - Response time should typically be under 2000ms
      
  - The response includes a `Content-Type: application/json` header
      
  - All required fields (id, title, author) are guaranteed to be present and
  non-empty in successful responses
url: "{{baseUrl}}/books"
method: GET
scripts:
  - type: afterResponse
    code: >-
      // ─── Status Code
      ────────────────────────────────────────────────────────

      pm.test("Status code is 200 OK", function () {
          pm.response.to.have.status(200);
      });


      // ─── Response Time
      ───────────────────────────────────────────────────────

      pm.test("Response time is under 1000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(1000);
      });


      // ─── Content-Type Header
      ─────────────────────────────────────────────────

      pm.test("Content-Type is application/json", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });


      // ─── Response is an Array ─────────────────────────────────────────────

      pm.test("Response body is a JSON array", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.be.an('array');
      });


      // ─── Array is Not Empty ───────────────────────────────────────────────

      pm.test("Response array is not empty", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.length).to.be.above(0);
      });


      // ─── Required Fields Present ─────────────────────────────────────────────

      pm.test("Every book contains all required fields", function () {
          const jsonData = pm.response.json();
          jsonData.forEach(function (book, index) {
              pm.expect(book, `Book at index ${index}`).to.have.all.keys('id', 'title', 'author', 'isbn', 'publishedYear');
          });
      });


      // ─── Field Type Validation ───────────────────────────────────────────────

      pm.test("id is a positive integer for every book", function () {
          const jsonData = pm.response.json();
          jsonData.forEach(function (book, index) {
              pm.expect(book.id, `id at index ${index}`).to.be.a('number');
              pm.expect(book.id, `id at index ${index}`).to.satisfy(Number.isInteger, 'id should be an integer');
              pm.expect(book.id, `id at index ${index}`).to.be.above(0);
          });
      });


      pm.test("title is a non-empty string for every book", function () {
          const jsonData = pm.response.json();
          jsonData.forEach(function (book, index) {
              pm.expect(book.title, `title at index ${index}`).to.be.a('string').and.not.empty;
          });
      });


      pm.test("author is a non-empty string for every book", function () {
          const jsonData = pm.response.json();
          jsonData.forEach(function (book, index) {
              pm.expect(book.author, `author at index ${index}`).to.be.a('string').and.not.empty;
          });
      });


      pm.test("isbn is a non-empty string for every book", function () {
          const jsonData = pm.response.json();
          jsonData.forEach(function (book, index) {
              pm.expect(book.isbn, `isbn at index ${index}`).to.be.a('string').and.not.empty;
          });
      });


      pm.test("publishedYear is a valid 4-digit year for every book", function () {
          const jsonData = pm.response.json();
          jsonData.forEach(function (book, index) {
              pm.expect(book.publishedYear, `publishedYear at index ${index}`).to.be.a('number');
              pm.expect(book.publishedYear, `publishedYear at index ${index}`).to.satisfy(Number.isInteger, 'publishedYear should be an integer');
              pm.expect(book.publishedYear, `publishedYear at index ${index}`).to.be.within(1000, new Date().getFullYear() + 1);
          });
      });


      // ─── No Extra Unexpected Fields ──────────────────────────────────────────

      pm.test("No book contains unexpected extra fields", function () {
          const jsonData = pm.response.json();
          const allowedKeys = ['id', 'title', 'author', 'isbn', 'publishedYear'];
          jsonData.forEach(function (book, index) {
              Object.keys(book).forEach(function (key) {
                  pm.expect(allowedKeys, `Unexpected field "${key}" at index ${index}`).to.include(key);
              });
          });
      });


      // ─── ISBN Format ─────────────────────────────────────────────────────────

      pm.test("isbn has a plausible length (10 or 13 digits) for every book", function () {
          const jsonData = pm.response.json();
          jsonData.forEach(function (book, index) {
              const digits = book.isbn.replace(/[^0-9]/g, '');
              pm.expect([10, 13], `isbn length at index ${index}`).to.include(digits.length);
          });
      });


      // ─── No Null Values on Required Fields ───────────────────────────────────

      pm.test("Required fields are not null for every book", function () {
          const jsonData = pm.response.json();
          jsonData.forEach(function (book, index) {
              ['id', 'title', 'author', 'isbn', 'publishedYear'].forEach(function (field) {
                  pm.expect(book[field], `${field} at index ${index} should not be null`).to.not.be.null;
                  pm.expect(book[field], `${field} at index ${index} should not be undefined`).to.not.be.undefined;
              });
          });
      });
    language: text/javascript
