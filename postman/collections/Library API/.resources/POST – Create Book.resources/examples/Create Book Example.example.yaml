$kind: http-example
request:
  url: "{{baseUrl}}/books"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "title": "The Great Gatsby",
        "author": "F. Scott Fitzgerald",
        "isbn": "9780743273565",
        "publishedYear": 1925
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
          "id": 1,
          "title": "The Great Gatsby",
          "author": "F. Scott Fitzgerald",
          "isbn": "9780743273565",
          "publishedYear": 1925
      }
order: 1000
