$kind: http-request
description: >-
  # Get Book by ID


  ## Overview


  This endpoint retrieves detailed information about a single book from the
  library by its unique identifier. Use this endpoint when you need to fetch
  complete book details for display, editing, or reference purposes.


  ## HTTP Method and Endpoint


  ```

  GET {{baseUrl}}/books/:id

   ```

  ## Path Parameters


  | Parameter | Type | Required | Description |

  | --- | --- | --- | --- |

  | `id` | integer | Yes | The unique identifier of the book to retrieve. Must
  be a valid book ID that exists in the library database. |


  **Example:** `/books/1` retrieves the book with ID 1.


  ## Response Format


  ### Success Response (200 OK)


  The endpoint returns a JSON object containing the book's details:


  ``` json

  {
    "id": 1,
    "title": "Book Title",
    "author": "Author Name"
  }

   ```

  ### Response Fields


  | Field | Type | Description |

  | --- | --- | --- |

  | `id` | integer | The unique identifier of the book |

  | `title` | string | The title of the book |

  | `author` | string | The name of the book's author |


  ## Example Use Cases


  1. **Display Book Details**: Fetch complete information about a specific book
  to display on a book detail page
      
  2. **Verify Book Existence**: Check if a book with a specific ID exists in the
  library
      
  3. **Data Validation**: Retrieve current book data before performing update
  operations
      
  4. **Reference Lookup**: Get book information for citation or reference
  purposes
      

  ## Endpoint Behavior Notes


  - The endpoint expects a valid integer book ID in the URL path
      
  - If the book ID doesn't exist, the API may return a 404 Not Found error
      
  - Response time should typically be under 2000ms
      
  - The response includes a `Content-Type: application/json` header
      
  - All required fields (id, title, author) are guaranteed to be present and
  non-empty in successful responses
url: "{{baseUrl}}/books/1"
method: GET
scripts:
  - type: afterResponse
    code: >-
      // Request-specific tests for Get Book

      // Note: Common tests (response time, Content-Type, JSON validation,
      security headers, 5xx check) are handled at collection level


      pm.test("Status code is 200 OK", function () {
          pm.response.to.have.status(200);
      });


      pm.test("Response has required book properties", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property('id');
          pm.expect(jsonData).to.have.property('title');
          pm.expect(jsonData).to.have.property('author');
          pm.expect(jsonData).to.have.property('isbn');
          pm.expect(jsonData).to.have.property('publishedYear');
      });


      pm.test("Book ID is a positive integer", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.id).to.be.a('number');
          pm.expect(jsonData.id).to.be.above(0);
      });


      pm.test("Published year is a valid year", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.publishedYear).to.be.a('number');
          pm.expect(jsonData.publishedYear).to.be.within(1000, new Date().getFullYear() + 1);
      });
    language: text/javascript
examples: ./.resources/GET – Get Book.resources/examples
