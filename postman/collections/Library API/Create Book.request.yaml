$kind: http-request
name: Create Book
url: "{{baseUrl}}/books"
method: POST
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "title": "The Great Gatsby",
      "author": "F. Scott Fitzgerald",
      "isbn": "9780743273565",
      "publishedYear": 1925
    }
scripts:
  - type: afterResponse
    code: >-
      // ─── Status Code
      ────────────────────────────────────────────────────────

      pm.test("Status code is 201 Created", function () {
          pm.response.to.have.status(201);
      });


      // ─── Response Time
      ───────────────────────────────────────────────────────

      pm.test("Response time is under 1000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(1000);
      });


      // ─── Content-Type Header
      ─────────────────────────────────────────────────

      pm.test("Content-Type is application/json", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });


      // ─── Response is an Object
      ───────────────────────────────────────────────

      pm.test("Response body is a JSON object", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.be.an('object').and.not.an('array');
      });


      // ─── Required Fields Present
      ─────────────────────────────────────────────

      pm.test("Response contains all required book fields", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.all.keys('id', 'title', 'author', 'isbn', 'publishedYear');
      });


      // ─── Server-Assigned ID
      ──────────────────────────────────────────────────

      pm.test("Created book has a server-assigned positive integer id", function
      () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.id).to.be.a('number');
          pm.expect(jsonData.id).to.satisfy(Number.isInteger, 'id should be an integer');
          pm.expect(jsonData.id).to.be.above(0);
      });


      // ─── Echoes Back Sent Fields
      ─────────────────────────────────────────────

      pm.test("Response title matches the sent title", function () {
          const requestData = JSON.parse(pm.request.body.raw);
          const jsonData = pm.response.json();
          pm.expect(jsonData.title).to.eql(requestData.title);
      });


      pm.test("Response author matches the sent author", function () {
          const requestData = JSON.parse(pm.request.body.raw);
          const jsonData = pm.response.json();
          pm.expect(jsonData.author).to.eql(requestData.author);
      });


      pm.test("Response isbn matches the sent isbn", function () {
          const requestData = JSON.parse(pm.request.body.raw);
          const jsonData = pm.response.json();
          pm.expect(jsonData.isbn).to.eql(requestData.isbn);
      });


      pm.test("Response publishedYear matches the sent publishedYear", function
      () {
          const requestData = JSON.parse(pm.request.body.raw);
          const jsonData = pm.response.json();
          pm.expect(jsonData.publishedYear).to.eql(requestData.publishedYear);
      });


      // ─── Field Type Validation
      ───────────────────────────────────────────────

      pm.test("title is a non-empty string", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.title).to.be.a('string').and.not.empty;
      });


      pm.test("author is a non-empty string", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.author).to.be.a('string').and.not.empty;
      });


      pm.test("isbn is a non-empty string", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.isbn).to.be.a('string').and.not.empty;
      });


      pm.test("publishedYear is a valid 4-digit year", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.publishedYear).to.be.a('number');
          pm.expect(jsonData.publishedYear).to.satisfy(Number.isInteger, 'publishedYear should be an integer');
          pm.expect(jsonData.publishedYear).to.be.within(1000, new Date().getFullYear() + 1);
      });


      // ─── No Null Values on Required Fields
      ───────────────────────────────────

      pm.test("Required fields are not null or undefined", function () {
          const jsonData = pm.response.json();
          ['id', 'title', 'author', 'isbn', 'publishedYear'].forEach(function (field) {
              pm.expect(jsonData[field], `${field} should not be null`).to.not.be.null;
              pm.expect(jsonData[field], `${field} should not be undefined`).to.not.be.undefined;
          });
      });


      // ─── Store Created Book ID for Downstream Requests
      ───────────────────────

      pm.test("Store created book id in collection variable", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.id).to.be.a('number').and.above(0);
          pm.collectionVariables.set("bookId", jsonData.id);
      });
    language: text/javascript
order: 2000
